# Profile: postgres — use when PostgreSQL is running in Docker.
# Activate with: --spring.profiles.active=postgres

# PostgreSQL connection (must match docker-compose.yml: host=localhost, port=5432)
spring.datasource.url=jdbc:postgresql://localhost:5432/pencherdb
spring.datasource.username=appuser
spring.datasource.password=apppass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
