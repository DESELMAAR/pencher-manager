# Application
spring.application.name=pencher-manager
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/pencherdb
spring.datasource.username=appuser
spring.datasource.password=apppass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway (optional: set to false if you rely only on ddl-auto=update)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
pencher.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-pencher-manager-jwt-signing-change-in-production}
pencher.jwt.access-expiration-ms=900000
pencher.jwt.refresh-expiration-ms=604800000

# Grace period in minutes: punches within this after planned start are ON_TIME
pencher.attendance.grace-period-minutes=5

# Planning API (external)
pencher.planning.api.url=${PLANNING_API_URL:http://localhost:9090}
pencher.planning.api.timeout-ms=5000
pencher.planning.api.retry-max-attempts=2
pencher.planning.use-mock=${PLANNING_USE_MOCK:true}

# CORS (Next.js frontend)
pencher.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000

# Scheduler
pencher.scheduler.attendance-cron=0 0 23 * * ?

# Actuator (optional, for health)
management.endpoints.web.exposure.include=health,info
